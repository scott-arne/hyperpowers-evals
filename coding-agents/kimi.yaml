name: kimi
# The kimi engine binary is `kimi` under ~/.kimi-code/bin (not on PATH by
# default, and NOT named `kimi-code`). The launcher prepends ~/.kimi-code/bin to
# PATH so this resolves via Bun.which.
binary: kimi
# Collapse the kimi config dir into the throwaway $HOME. kimi defaults
# KIMI_CODE_HOME to $HOME/.kimi-code when unset (verified: a one-shot prompt with
# KIMI_CODE_HOME unset writes config + sessions under $HOME/.kimi-code), so with
# ".kimi-code" configDir == <runHome>/.kimi-code: provisioning seeds the config +
# host OAuth creds there, and the launcher (which sets HOME via $QUORUM_HOME_ENV
# and omits KIMI_CODE_HOME) finds them via the $HOME default.
home_config_subdir: ".kimi-code"
session_log_dir: "${QUORUM_AGENT_HOME}/.kimi-code/sessions"
session_log_glob: "**/wire.jsonl"
normalizer: kimi
# Auth is OAuth-or-env (KimiAgent.provision): KIMI_MODEL_API_KEY is only needed
# for the api-key path; an OAuth login under ~/.kimi-code works without it. The
# "neither oauth nor env" failure is raised in provision() with a clear message,
# not by the loader's required_env check.
required_env:
  - SUPERPOWERS_ROOT
max_time: 10m
