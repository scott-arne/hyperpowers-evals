name: claude-vertex
runtime_family: claude
binary: claude
home_config_subdir: ".claude"
session_log_dir: "${QUORUM_AGENT_HOME}/.claude/projects"
session_log_glob: "**/*.jsonl"
normalizer: claude
# Vertex AI auth instead of ANTHROPIC_API_KEY: CLAUDE_CODE_USE_VERTEX selects
# the Vertex provider, CLOUD_ML_REGION is the inference region, and
# ANTHROPIC_VERTEX_PROJECT_ID names the GCP project. Credentials resolve via
# Google Application Default Credentials; because the launcher pins $HOME to
# the throwaway run home, ClaudeAgent.provision anchors the operator's real ADC
# by exporting GOOGLE_APPLICATION_CREDENTIALS (an operator-set value is
# forwarded as-is, else the well-known ~/.config/gcloud file). The presence of
# CLAUDE_CODE_USE_VERTEX here is the trigger that routes provisioning down the
# Vertex path (see ClaudeAgent.provision).
required_env:
  - CLAUDE_CODE_USE_VERTEX
  - CLOUD_ML_REGION
  - ANTHROPIC_VERTEX_PROJECT_ID
  - SUPERPOWERS_ROOT
max_time: 10m
project_prompt: claude.project-prompt.md
# The Vertex publisher model id (not the API alias "opus"). Matches the host's
# ANTHROPIC_MODEL; override per run if a different Vertex model is wanted.
model: claude-opus-4-8
