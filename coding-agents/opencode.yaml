name: opencode
binary: opencode
# The opencode home root is the throwaway per-run $HOME (= $QUORUM_AGENT_HOME): it
# pins HOME and the XDG dirs, and opencode keys its session DB off XDG_DATA_HOME.
# With "." the config dir IS that home, so the launcher and the capture subprocess
# share the same home — and therefore the same session store. "." means the home
# itself.
home_config_subdir: "."
session_log_dir: "${QUORUM_AGENT_HOME}/.quorum/session-exports"
session_log_glob: "[0-9]*-ses_*.json"
normalizer: opencode
required_env:
  - SUPERPOWERS_ROOT
max_time: 10m
max_concurrency: 1
