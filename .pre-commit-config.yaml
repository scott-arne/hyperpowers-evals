repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        pass_filenames: false
      - id: ty-check
        name: ty check
        entry: uv run ty check
        language: system
        pass_filenames: false
      - id: barf-check
        name: barf check
        entry: uv run barf check
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
