name: antigravity
binary: agy
# Collapse the antigravity config dir into the throwaway $HOME. agy defaults its
# gemini state dir to $HOME/.gemini when --gemini_dir is omitted (verified
# empirically: `HOME=<tmp> agy plugin list` creates <tmp>/.gemini/config), and it
# reads its live, rotating OAuth token from $HOME/.gemini/oauth_creds.json at
# runtime. With "." the config dir IS the run's throwaway home, so configDir ==
# runHome: provisioning seeds .gemini (plugin + settings + the C1 oauth creds)
# directly under the home the launcher pins via $QUORUM_HOME_ENV. The launcher
# still passes an EXPLICIT --gemini_dir="$QUORUM_AGENT_HOME/.gemini" so the state
# seam is unambiguous.
home_config_subdir: "."
session_log_dir: "${QUORUM_AGENT_HOME}/.gemini/antigravity-cli/brain"
session_log_glob: "**/transcript.jsonl"
normalizer: antigravity
required_env:
  - SUPERPOWERS_ROOT
max_time: 10m
# agy's Gemini Code Assist backend 429s (RESOURCE_EXHAUSTED) on concurrent
# calls and a burst trips a multi-hour rate window. Run agy strictly serial
# regardless of run-all --jobs.
max_concurrency: 1
# Even serial back-to-back starts read as a burst from the Code Assist backend's
# view, so space agy launches at least this many seconds apart, start-to-start.
# 30s is the PRI-2203 starting value; tune from experience.
launch_spacing_seconds: 30
