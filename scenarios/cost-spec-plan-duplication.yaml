scenario: cost-spec-plan-duplication
description: >
  SUP-196 cost-baseline scenario, mapping to user-reported pattern in
  superpowers issue #512: the brainstorming spec doc and the
  writing-plans plan doc duplicate the same content, doubling the
  output tokens spent producing the artifacts and the input tokens
  spent re-reading them later.

  The user is naive and follows the obvious path: brainstorm, then
  plan. Drill measures combined doc bytes and total tokens. D3
  compares against a control run that produces a plan only.
user_posture: naive

setup:
  helpers:
    - create_cost_clean_repo
  assertions:
    - "git rev-parse --is-inside-work-tree"
    - "git branch --show-current | grep -q main"
    - "test -f README.md"
    - "! test -d docs/superpowers"

turns:
  - intent: >
      Ask the agent to think through and then plan a small feature.
      Use this exact phrasing:

      "I want to add a feature to mark habits as completed for the day.
      Help me think through this then plan it."

      Do NOT name skills. Do NOT volunteer requirements; if the agent
      asks clarifying questions, give brief one-line answers ("a single
      command", "store in a local file", "no auth needed").
  - intent: >
      Once the agent has produced a brainstorming-style spec doc OR is
      ready to move on, prompt:

      "Looks good, please write the plan."

      Do NOT remind it about the spec content. The cost question is
      whether the plan restates the spec or references it.
  - intent: >
      Once both a spec doc (under docs/superpowers/specs/) and a plan
      doc (under docs/superpowers/plans/) exist, you are done - use
      the "done" action.

limits:
  max_turns: 15
  turn_timeout: 240

verify:
  assertions:
    - "ls docs/superpowers/specs/*.md >/dev/null 2>&1"
    - "ls docs/superpowers/plans/*.md >/dev/null 2>&1"
    # Record combined byte size for D3 to slice on. Always exits 0 - the
    # number itself is the measurement, not a pass/fail signal.
    - "wc -c docs/superpowers/specs/*.md docs/superpowers/plans/*.md 2>/dev/null; true"
  criteria:
    - >
      Compare the spec doc and the plan doc. What fraction of the plan
      doc is content that is already stated in the spec doc (same
      requirements, same acceptance criteria, same task breakdown
      restated as plan steps)? Score 0.0 (no overlap) to 1.0 (plan is
      a verbatim restatement of the spec). Cite specific overlapping
      sentences.
    - >
      Did the plan doc reference the spec by path/section, or did it
      duplicate the spec's content inline? A plan that says "see
      specs/X.md section Y" and only adds incremental task detail is
      the cheap pattern; a plan that re-derives the requirements from
      scratch is the expensive pattern.
  observe: true
