name: claude-auto
runtime_family: claude
binary: claude
home_config_subdir: ".claude"
session_log_dir: "${QUORUM_AGENT_HOME}/.claude/projects"
session_log_glob: "**/*.jsonl"
normalizer: claude
# Provider-agnostic Claude agent: provisioning detects the host's auth from the
# environment and seeds the matching mode (detectClaudeProvider) —
# CLAUDE_CODE_USE_VERTEX wins, then CLAUDE_CODE_USE_BEDROCK, then
# ANTHROPIC_API_KEY; none set (or both switches set) fails loud at setup. Only
# SUPERPOWERS_ROOT is required up front; the provider vars are validated in
# ClaudeAgent.provision with actionable errors, so the same `--coding-agent
# claude-auto` command works on Vertex, Bedrock, and API-key hosts.
required_env:
  - SUPERPOWERS_ROOT
max_time: 10m
project_prompt: claude.project-prompt.md
# Resolved at run time (see resolveClaudeAutoModel): the host's ANTHROPIC_MODEL
# when set — it is already in the detected provider's naming scheme — else the
# provider's Opus id (Vertex claude-opus-4-8 / Bedrock
# us.anthropic.claude-opus-4-8 / API alias opus).
model: auto
