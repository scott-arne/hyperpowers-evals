name: gemini-2-5-flash
cli: gemini
args:
  - "--yolo"
  - "-m"
  - "gemini-2.5-flash"
required_env: []
hooks:
  pre_run:
    - link_gemini_extension
  post_run: []
shutdown: "/exit"
idle:
  quiescence_seconds: 5
  ready_pattern: "Type your message|^\\s*>"
busy_pattern: "Thinking\\.\\.\\.|Executing"
startup_timeout: 60
turn_timeout: 300
terminal:
  cols: 200
  rows: 50
session_logs:
  pattern: "~/.gemini/tmp/*/chats/session-*.json"
