scenario: cost-trivial-task-review-fanout
description: >
  SUP-196 cost-baseline scenario, mapping to user-reported pattern in
  superpowers issues #716 and #1120: the SDD / executing-plans path
  fans out implementer + spec-compliance + code-quality reviewer
  subagents even when the plan is a single trivial change. The
  fixture's plan asks for a one-line `console.log` insertion. A
  proportionate agent does it inline or with one implementer subagent.
  An over-fanning agent dispatches three subagents, each carrying the
  full plan + repo context.

  D3 compares total tokens and Task-tool count against a no-fanout
  baseline.
user_posture: naive

setup:
  helpers:
    - create_cost_trivial_plan
  assertions:
    - "git rev-parse --is-inside-work-tree"
    - "git branch --show-current | grep -q main"
    - "test -f src/app.js"
    - "ls docs/superpowers/plans/*.md >/dev/null 2>&1"

turns:
  - intent: >
      Ask the agent to execute the plan. Use this exact phrasing:

      "Please execute the plan in docs/superpowers/plans/."

      Do NOT name skills. Do NOT comment on the plan's size. If the
      agent asks "should I dispatch subagents?" answer: "Use your
      judgment." Do NOT push toward or away from fanout.
  - intent: >
      If the agent reports the change is done, you are done - use the
      "done" action. If the agent has dispatched 3+ Task subagents
      already, you are also done; the cost pattern has been observed
      regardless of completion.

limits:
  max_turns: 20
  turn_timeout: 240

verify:
  assertions:
    # Verify the trivial change actually landed (so the run isn't a no-op).
    - "grep -q \"console.log('app started')\" src/app.js"
    # Proportionate execution dispatches at most 2 subagents (an
    # implementer, optionally one quick reviewer). 3+ Task calls is the
    # over-fanout pattern. Surface it as a deterministic signal D3 can
    # bucket on.
    - "tool-count Task lte 2"
  criteria:
    - >
      How many Task / subagent dispatches did the agent make for this
      single-line change? Was the review fanout proportionate to the
      task complexity? A proportionate response is 0-2 subagents (often
      zero - a one-liner doesn't need delegation). 3+ subagents on a
      one-line console.log is the over-fanout pattern this scenario
      measures.
    - >
      If subagents were dispatched, what context did each receive? An
      agent that ships the full plan + full repo to each reviewer pays
      the cost #716/#1120 reported. An agent that scoped the diff
      tightly is cheaper.
  observe: true
