scenario: cost-checkbox-over-trigger
description: >
  SUP-196 cost-baseline scenario, mapping to user-reported pattern in
  superpowers issue #1222: brainstorming over-triggers on small,
  obviously-mechanical UI tweaks. The fixture is a single empty page;
  the user asks for a basic checkbox. A well-calibrated agent jumps
  straight to implementation. An over-triggering agent invokes the
  brainstorming skill first, ballooning token cost on a trivial change.

  This scenario is a measurement instrument, not a value judgment. D3
  runs it across backends and compares total tokens against the
  no-brainstorming baseline; the headline is the cost delta, not whether
  the assertion passes.
user_posture: naive

setup:
  helpers:
    - create_cost_checkbox_page
  assertions:
    - "git rev-parse --is-inside-work-tree"
    - "git branch --show-current | grep -q main"
    - "test -f index.html"
    - "! grep -qi checkbox index.html"

turns:
  - intent: >
      Ask the agent to add a basic checkbox to the page. Use this exact
      phrasing:

      "I want to add a checkbox component to this page that lets users
      mark items as done. Just a basic checkbox with on/off state,
      nothing fancy."

      Do NOT mention skills, brainstorming, or any superpowers concept.
      Do NOT elaborate on requirements unless the agent specifically
      asks for clarification.
  - intent: >
      If the agent asks clarifying questions about scope, behavior, or
      design, give brief one-line answers ("just one checkbox", "doesn't
      need to persist", "any styling is fine") so the conversation moves
      on. Do not seed a design discussion.
  - intent: >
      Once the page contains a `<input type="checkbox">` OR the agent
      has invoked the brainstorming skill, you are done - use the
      "done" action.

limits:
  max_turns: 10
  turn_timeout: 180

verify:
  # Inverted check: the scenario "passes" when brainstorming did NOT
  # over-trigger on this trivial mechanical task. D3 cares more about
  # the captured token totals than this pass/fail bit.
  assertions:
    - "skill-called superpowers:brainstorming || exit 0; exit 1"
  criteria:
    - >
      Did the agent jump straight to implementation, or invoke
      brainstorming first? Expected on a well-calibrated harness:
      jumped to implementation. Over-triggering is the cost pattern
      we're measuring.
  observe: true
