scenario: cost-tool-result-bloat
description: >
  SUP-196 cost-baseline scenario, mapping to user-reported pattern in
  superpowers issue #1194: tool-result content (full file reads,
  large grep outputs) accumulates in the parent transcript and burns
  cache_creation tokens on every subsequent turn. The fixture is a
  src/ tree of five ~1200-line synthetic CRUD modules. The user asks
  for "three things that could be improved." A targeted agent greps
  or reads top-of-file slices; a naive agent reads every file in full
  and the parent transcript balloons.

  Headline metric is `tool_result_total_bytes` from token_usage.json.
user_posture: naive

setup:
  helpers:
    - create_cost_large_files
  assertions:
    - "git rev-parse --is-inside-work-tree"
    - "git branch --show-current | grep -q main"
    - "test -d src"
    - "test \"$(ls src/*.js | wc -l | tr -d ' ')\" = 5"

turns:
  - intent: >
      Ask the agent to review the codebase. Use this exact phrasing:

      "Take a look at the codebase in src/ and tell me three things
      that could be improved."

      Do NOT mention skills, tools, grep, or reading strategy. Do NOT
      hint that the files are large.
  - intent: >
      Once the agent gives its three improvements (or asks for
      clarification you can't usefully answer), you are done - use the
      "done" action.

limits:
  max_turns: 8
  turn_timeout: 240

verify:
  assertions:
    # The agent must actually look at the code (run at least one Read
    # or Grep). A "didn't read anything" run isn't measuring cost
    # patterns, just refusal.
    - "tool-called Read || tool-called Grep"
    # Surface the bloat metric for D3 sweeps. Always exits 0; the
    # captured number is the measurement, not a pass/fail.
    - "test -f token_usage.json && python3 -c \"import json,sys; d=json.load(open('token_usage.json')); print('tool_result_total_bytes', d.get('tool_result_total_bytes', 'unknown'))\" || true"
  criteria:
    - >
      Did the agent read full file contents into context, or use grep
      / targeted reads to investigate efficiently? Cite specific tool
      calls. A run that calls Read on all five files with no offset
      is the bloat pattern; a run that greps for patterns or reads
      narrow slices is the targeted pattern.
    - >
      Were the three improvements specific to actual code in the
      modules, or generic suggestions ("add error handling", "consider
      types") that didn't require reading the files at all? Generic
      suggestions after large reads are the worst case - both
      expensive and uninformative.
  observe: true
