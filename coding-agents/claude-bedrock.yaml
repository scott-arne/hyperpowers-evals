name: claude-bedrock
runtime_family: claude
binary: claude
home_config_subdir: ".claude"
session_log_dir: "${QUORUM_AGENT_HOME}/.claude/projects"
session_log_glob: "**/*.jsonl"
normalizer: claude
# Bedrock auth instead of ANTHROPIC_API_KEY: CLAUDE_CODE_USE_BEDROCK selects the
# Bedrock provider and AWS_REGION is the inference region. AWS credentials are
# resolved by the SDK from the operator's profile (AWS_PROFILE) or static keys;
# ClaudeAgent.provision forwards whichever are present and anchors the AWS config
# files at the real home so the throwaway HOME does not hide them. The absence of
# ANTHROPIC_API_KEY here is the trigger that routes provisioning down the Bedrock
# path (see ClaudeAgent.provision).
required_env:
  - CLAUDE_CODE_USE_BEDROCK
  - AWS_REGION
  - SUPERPOWERS_ROOT
max_time: 10m
project_prompt: claude.project-prompt.md
# A Bedrock inference-profile model id (not the API alias "opus"). Matches the
# host's ANTHROPIC_MODEL; override per run if a different Bedrock model is wanted.
model: us.anthropic.claude-opus-4-8
